# GitHub Actions CI for all major OSes and architectures

name: CI Build Matrix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-matrix:
    name: Build on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            runner: ubuntu-24.04-arm
            arch: arm64
          - os: macos-13
            runner: macos-13
            arch: x86_64
          - os: macos-14
            runner: macos-14        # Native Apple Silicon (M1)
            arch: arm64
          - os: windows-latest
            runner: windows-latest
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1
      - name: Install dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libboost-all-dev
      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew update
          brew install cmake ninja boost
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake ninja boost-msvc -y
      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DARCH=default
        shell: bash
      - name: Build
        run: |
          cmake --build build --parallel
        shell: bash
      - name: Test
        run: |
          cd build && ctest --output-on-failure
        shell: bash
