# GitHub Actions CI for all major OSes and architectures

name: CI Build Matrix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-matrix:
    name: Build on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            runner: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            runner: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
            runner: macos-14
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libboost-thread-dev libboost-date-time-dev \
            libboost-chrono-dev libboost-serialization-dev \
            libssl-dev

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew install boost openssl cmake ninja
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> "$GITHUB_ENV"

      - name: Configure CMake (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DARCH=default -DSTATIC=ON

      - name: Configure CMake (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DARCH=default -DSTATIC=ON \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"

      - name: Build
        run: cmake --build build --parallel
        shell: bash
